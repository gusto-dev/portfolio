                  <tr>

                    <td><i class="icon icon-input-calendar mg-r4"></i>2019.06.21</td>
                  </tr>
                  <tr>
                    <th scope="row">기존근무시간</th>
                    <td><i class="icon icon-input-clock mg-r4"></i>08:00~13:00</td>
                    <td><i class="icon icon-input-clock mg-r4"></i>11:00~18:00</td>

                  <tr>

                    <td><i class="icon icon-input-calendar mg-r4"></i>2019.06.21</td>
                  </tr>
                  <tr>

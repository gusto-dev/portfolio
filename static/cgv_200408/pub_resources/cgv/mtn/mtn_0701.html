<!-- .show-pop 추가시 팝업 노출 -->
<div class="pop-dimed show-pop">
  <div data-pop="#" class="pop-house-full">
    <div class="pop-layer">
      <h3 class="bd-full">유지보수 연락망 등록 및 수정<i class="icon icon-close pop-close"></i></h3>
      <div class="pop-container">
        <div class="con">
          <div class="input-title flex-center">
            <h4>구분</h4>
          </div>
          <ul class="select-option list-3">
            <li class="active" href="">시설</li>
            <li>전기</li>
            <li>소방</li>
            <li>장비</li>
            <li>기타</li>
          </ul>
          <div class="input-title flex-center">
            <h4>위치</h4>
          </div>
          <ul class="select-option list-3">
            <li class="active" href="">매표</li>
            <li>매점</li>
            <li>플로어</li>
            <li>로비</li>
            <li>상영관</li>
            <li>화장실</li>
            <li>창고</li>
            <li>기타</li>
          </ul>
          <div class="input-horizontal">
            <div class="input-single-wide">
              <h5>업체명</h5>
              <div class="input-wrap">
                <input type="text" name="">
              </div>
            </div>
            <div class="input-single-wide">
              <h5>성명</h5>
              <div class="input-wrap">
                <input type="text" name="">
              </div>
            </div>
            <div class="input-single-wide">
              <h5>연락처</h5>
              <div class="input-wrap">
                <input type="text" name="">
              </div>
            </div>
            <div class="input-single-wide">
              <h5 class="mt-negative">비고</h5>
              <div class="input-wrap">
                <textarea name=""></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="btn-single">
        <button href="#" class="">저장</button>
      </div>
    </div>
  </div>
</div>
<!-- //팝업 -->

<!-- 팝업 -->
<div class="pop-dimed">
  <div class="pop-bg"></div>
  <div class="pop-house" data-pop="#">
    <div class="pop-layer">
      <!-- 190731 타이틀 변경 및 60분 추가-->
      <div class="pop-container pop-schedule">
        <h3 class="txt-c">시간 선택<i class="icon icon-close pop-close"></i></h3>
        <ul>
          <li class="active">5분</li>
          <li>10분</li>
          <li>20분</li>
          <li>30분</li>
          <li>60분</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<!-- 07/19 body class 삭제 -->
<body>
  <div class="cgv-mobile"> 

    <!-- header -->
    <header>
      <div class="control-btns front">
        <button type="button" class="btn-more"><i class="icon-more"></i></button>
        <!-- 뒤로가기 버튼이 존재할 경우 사용 -->
        <!-- <button type="button" class="btn-back"><i class="icon-back"></i></button> -->
      </div>
      <div class="header-contents">
        <a href="." class="btn-logo"><img src="../../../resources/images/index/logo.png" alt=""></a>
      </div>
      <div class="control-btns end">
        <!-- 알림이 있을때 .on 추가 -->
        <button type="button" class="btn-noti on">
          <i class="icon-noti"></i>
             <!-- 190725 추가 -->
        </button>
        <a href="#" class="btn-search-main"><i class="icon-search-main"></i></a>
      </div>
    </header>
    <!-- //header -->

    </section>

  <!-- 팝업 -->
  <!-- .show-pop 추가시 팝업 노출 -->
  <div class="pop-dimed show-pop">
    <div class="pop-bg"></div>
    <div class="pop-house">
      <div class="pop-layer pop-border">
        <!-- 7/14 수정 h3 위치 변경 -->
        <h3>출근체크<i class="icon icon-close pop-close"></i></h3>
        <div class="pop-container">
          <div class="pop-text-box txt-c">
            <button class="btn-inout">
              <img src="../../../resources/images/btn_in.png" />
            </button>
            <p class="sub-text02 mg-b12">*버튼을 클릭하여 출근 체크를 해주세요</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- //팝업 -->

  <!-- 팝업 -->
  <!-- .show-pop 추가시 팝업 노출 -->
  <div class="pop-dimed">
      <div class="pop-bg"></div>
      <div data-pop="#" class="pop-house">
        <div class="pop-layer pop-border">
          <!-- 7/14 수정 h3 위치 변경 -->
          <h3>출근확인<i class="icon icon-close pop-close"></i></h3>
          <div class="pop-container">
            <div class="con worker-result">
              <p>
                <span class="name">박서준</span> 님,<br />
                <!-- 퇴근상태일때 .out 추가, 출근상태일 때 .in 추가 -->
                <span class="status in">출근체크</span>가 정상처리 되었습니다.<br />
              </p>
              <p class="mg-t18">오늘도 좋은 하루 되세요!</p>
            </div>
          </div>
          <!-- 7/17 .btn-single 추가 -->
          <div class="btn-single">
            <a href="#" class="pop-close">확인</a>
          </div>
        </div>
      </div>
    </div>

<body>
    <div class="cgv-mobile">
        <!-- 190711 class 추가 (페이지 일괄적용)  -->

        <!-- header -->
        <header>
            <div class="control-btns front">
                <button type="button" class="btn-more"><i class="icon-more"></i></button>
                <!-- 뒤로가기 버튼이 존재할 경우 사용 -->
                <!-- <button type="button" class="btn-back"><i class="icon-back"></i></button> -->
            </div>
            <div class="header-contents">
                <a href="." class="btn-logo"><img src="../../../resources/images/index/logo.png" alt=""></a>
            </div>
            <div class="control-btns end">
                <a href="#" class="btn-search-main"><i class="icon-search-main"></i></a>
                <!-- 알림이 있을때 .on 추가 -->
                <button type="button" class="btn-noti on">
                    <i class="icon-noti"></i>
                    <!--     -->
                </button>
            </div>
        </header>
        <!-- //header -->

        <!-- main -->
        <section class="content-sub">
            <div class="content-title">
            </div>
            <div class="content-full content-list-box">
                <div class="content-list">
                </div>
            </div>
        </section>
    </div>
    <!-- //cgv-mobile -->
    
    <div class="pop-dimed show-pop">
        <div class="pop-bg"></div>
        <div data-pop="#gowork" class="pop-house">
            <div class="pop-layer">
                <h3>출근 등록</h3>
                <div class="pop-container">
                    <div class="con">
                        <div class="center-text">
                            <p class="f-color02 mg-t20">예정 출근 시간이 존재합니다.</p>
                            <p class="">출근체크 하시겠습니까?</p>
                        </div>
                        <div class="gowork-time">
                            <div class="input-single">
                                <p><i class="icon work01"></i>예정 출근 시간</p>
                                <div class="input-wrap">
                                    <input type="input" placeholder="07:30">
                                </div>
                            </div>
                        </div>
                        <div class="gowork-info">
                            <i class="icon gowork01"></i>
                            <p>출근체크는 예정 출근시간에 맞게<br>실제 출근시간으로 등록됩니다.</p>
                        </div>
                    </div>
                </div>
                <div class="btn-group btn-list2">
                    <a class="" type="button" role="button">출근</a>
                    <a class="" type="button" role="button">취소</a>
                </div>
            </div>  
        </div>
    </div>

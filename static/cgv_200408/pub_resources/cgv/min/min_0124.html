<body>
   <div class="cgv-mobile"> 

    <!-- header -->
    <header>
      <a class="nav-sub">
        <img class="icn-page-prev" src="../../../resources/images/icon_page_prev.png" aria-label="이전으로" />
        <h3 class="title">휴가 신청</h3>
      </a>
       <!-- 190712 버튼 제거 -->
    </header>
    <!-- //header -->

    <!-- main -->
    <section class="content-sub">
      <!-- 7/17 .content-list-box 추가 -->
      <div class="content-full content-list-box mg-t12">
        <!-- 7/17 .content-list 추가 -->
        <div class="content-list">
          <!-- 190717 class"subinner-container" 제거 -->
          <p class="sub-text mg-t5">미소지기 [#미소지기 이름] 은(는) 아래와 같은 사유가 발생하여 휴가 또는 약정한 스케줄 제외를 신청합니다</p>
          <div class="table-title mg-t6">
            <h5>휴가 구분</h5>
          </div>
          <div class="top-btn-list mg-t0">
            <button type="button">연차</button>
            <button type="button">보건</button>
            <button type="button" class="active">공가</button>
            <button type="button">경조</button>
            <button type="button">산재</button>
          </div>
          <div class="table table-info with-border"> <!-- 190717 class 확인 -->
            <table>
              <caption>휴가신청</caption>
              <tbody>
                <tr>
                  <th class="w25 txt-c" scope="row">사유</th>
                  <td colspan="3" class="tbl-input">
                    <div class="input-single">
                      <div class="input-wrap txt-c">
                        <input type="input" placeholder="사유를 입력하세요">
                      </div>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th class="w25 txt-c" scope="row">증빙서류</th>
                  <td colspan="3" class="txt-r">
                    <button type="button" class="btn-camera">카메라작동</button>
                  </td>
                </tr>
                <!-- 이미지 첨부시 -->
                <tr>
                  <th class="w25 txt-c" scope="row">증빙서류</th>
                  <td colspan="3" class="imgbox">
                    <img src="../../../resources/images/img_vacation_apply.png" class="img-document" alt="휴가신청 증빙서류" />
                    <button type="button" class="btn-clear">삭제</button> <!-- 190731 버튼 추가 -->
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- 7/17 버튼위치 변경, .btn-single 추가 -->
          <div class="btn-single">
            <a href="#" class="">신청하기</a> 
          </div>
        </div>
      </div>

    </section>

<body>
   <div class="cgv-mobile">

    <!-- header -->

      <a class="nav-sub">
        <img class="icn-page-prev" src="../../../resources/images/icon_page_prev.png" aria-label="이전으로" />

       <!-- 190712 버튼 제거 -->
    </header>
    <!-- //header -->

    <!-- main -->
    <section class="content-sub">
      <div class="content-full content-list-box mg-t15"> <!-- 190801 class 변경 -->
        <div class="content-list">
          <button type="button" class="btn-calendar-info location02">캘린더표기정보</button>
          <div id='calendar'></div>
          <script>
            document.addEventListener('DOMContentLoaded', function() {
              
            var toDay  =  new Date();
            // var toDay  =  new Date("2019","07",25);
            
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
              plugins: [ 'dayGrid','interaction' ],
              titleFormat: function(date) {
                  return toDay.getFullYear() +"년 "+ toDay.getMonth() +"월";
              },
              defaultDate: toDay,
              // locale: 'ko', // the initial locale
              editable: true,
              // selectable: true,
              eventLimit: true, // allow "more" link when too many events
              // defaultView:'dynamicCalendar',
              header: {
                left:   'prev',
                center: 'title',
                right:  'next'
              },
             
              eventLimit: false,
              columnHeaderText: function(date) {
                if (date.getDay() === 1) return '월';
                if (date.getDay() === 2) return '화';
                if (date.getDay() === 3) return '수';
                if (date.getDay() === 4) return '목';
                if (date.getDay() === 5) return '금';
                if (date.getDay() === 6) return '토';
                if (date.getDay() === 0) return '일';
              },

              views: {
                dynamicCalendar: {
                type: 'dayGrid',
                duration: { weeks: 6 },
                
                }
              },

              /* fc-day-number에 class "click" */

              dateClick: function(info) {
              	//초기화
              	$(".click").removeClass("click");
              	//해당 일자 검색
              	$(".fc-day-top").each(function(){
             		var date = $(this).attr("data-date");
             		if(info.dateStr == date){
             			//클래스추가
             			$(this).find("span").addClass("click");
             		}
              	});
                fn_test(info.dateStr);
              },
              eventClick: function(info) {ㅔ
                info.el.style.borderColor = 'red';
              },
              
              /*
              #9197a3  회색
              #4a90e2 파란색
              #fb7b89 분홍색
              #ff7a00 주황색
              */
              events: [
                {
                  title : "07:00"
                  ,start : "2019-08-01"
                  ,backgroundColor: "#9197a3"
                  ,borderColor: "#9197a3"
                },
                {
                  title : "07:00"
                  ,start : "2019-08-02"
                  ,backgroundColor: "#9197a3"
                  ,borderColor: "#9197a3"
                },
                {
                  title : "07:00"
                  ,start : "2019-08-03"
                  ,backgroundColor: "#9197a3"
                  ,borderColor: "#9197a3"
                },
                {
                  title : "07:00"
                  ,start : "2019-08-03"
                  ,backgroundColor: "#4a90e2"
                  ,borderColor: "#4a90e2"
                },
                {
                  title : "07:00"
                  ,start : "2019-08-05"
                  ,backgroundColor: "#4a90e2"
                  ,borderColor: "#4a90e2"
                },
                {
                  title : "12:00"
                  ,start : "2019-08-04"
                  ,backgroundColor: "#fb7b89"
                  ,borderColor: "#fb7b89"
                },
                {
                  title : "12:00"
                  ,start : "2019-08-14"
                  ,backgroundColor: "#4a90e2"
                  ,borderColor: "#4a90e2"
                },
                {
                  title : "12:00"
                  ,start : "2019-08-17"
                  ,backgroundColor: "#4a90e2"
                  ,borderColor: "#4a90e2"
                },
          
              ]
            });
            calendar.render();
            
            function fn_test(date){
              calendar.addEvent({
                title: 'dynamic event',
                start: date,
                allDay: true
              });
            }
          });
          </script>
          <div class="icon-box mg-t15"> <!-- 190717 class" subinner-container" 제거 -->
            <div class="icon-text"><i class="icon icon-input-calendar mg-r4"></i>2019-06-26</div>
            <div class="icon-text"><i class="icon icon-input-clock mg-r4"></i>09:00 ~ 18:00</div>
            <div class="icon-text"><i class="icon icon-gps02 mg-r4"></i>매점 1</div>
          </div>
          <!-- 190718 추가 -->
          <div class="button-text-box">
            <p class="sub-text03">맞교대 신청 (
              <span>06-27</span> <span>12:00</span>~<span>20:00</span>)

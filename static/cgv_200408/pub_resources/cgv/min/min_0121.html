    <!-- header -->

      <a class="nav-sub">
        <img class="icn-page-prev" src="../../../resources/images/icon_page_prev.png" aria-label="이전으로" />

      </a>
       <!-- 190712 버튼 제거 -->
    </header>
    <!-- //header -->

    <!-- main -->
    <section class="content-sub">
      <div class="content-full content-list-box">
        <div class="content-list">
          <div class="notice-box">
            <h4 class="notice-tit">맞교대 주의사항</h4>
            <p class="text">맞교대는 최소 근무 1일전 신청 가능</p>
            <p class="text">맞교대 시 신청 미소지기와 수락 미소지기 간 충분한 협의 후 신청</p>
            <p class="text">맞교대 시 신청자 또는 수락자의 휴일 변경에 대해 동의함</p>
          </div>
          <div class="table table-info line-style02">
            <table>
              <caption>맞교대신청</caption>
              <thead>
                <tr>
                  <th class="w32 txt-c" scope="col">구분</th>
                  <th class="w34 txt-c" scope="col">신청자</th>
                  <th class="w34 txt-c" scope="col">수락자</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th scope="row">이름</th>
                  <td class="txt-c">박서준</td>
                  <td class="txt-c btn-search-type">
                    <span>박서준</span>
                    <button type="button" class="btn-search02"></button>
                  </td>
                  <!-- <td class="txt-c tbl-input">
                    <form class="search-form search-form-border">
                      <div class="search-group group">
                        <input class="input-search-func input-search icn" placeholder="검색하기" />        
                      </div>
                      <button href="#lookup" type="button" class="pop-open">
                        <img class="icn-search" src="../../../resources/images/icon_search.png" alt="검색" />
                      </button>
                    </form>
                  </td> -->
                </tr>
                <tr>
                  <th scope="row">소정근로시간</th>
                  <td class="txt-c">5</td>
                  <td class="txt-c">-</td>
                </tr>
                <tr>
                  <th scope="row">기존근무일</th>
                  <td><i class="icon icon-input-calendar mg-r4"></i>2019.06.01</td>
                  <td class="tbl-input txt-c">-</td>
                </tr>
                <tr>
                  <th scope="row">기존근무시간</th>
                  <td><i class="icon icon-input-clock mg-r4"></i>08:00~13:00</td>
                  <td><i class="icon icon-input-clock mg-r4"></i>11:00~18:00</td>
                </tr>
                <tr>
                  <th scope="row">변경근무일</th>
                  <td class="tbl-input">
                    <button class="input-button pop-open" href="#calendarPop">
                      <i class="icon icon-input-calendar"></i>
                      <span class="mg-l2">날짜선택</span>
                    </button>
                  </td>
                  <td><i class="icon icon-input-calendar mg-r4"></i>2019.06.21</td>
                </tr>
                <tr>
                  <th scope="row">변경근무시간</th>
                  <td><i class="icon icon-input-clock mg-r4"></i>08:00~13:00</td>
                  <td><i class="icon icon-input-clock mg-r4"></i>11:00~18:00</td>
                </tr>
                <tr>
                  <th scope="row">사유</th>
                  <td colspan="2" class="tbl-input">
                    <div class="input-single">
                      <div class="input-wrap">
                        <input type="input" placeholder="사유를 입력하세요">
                      </div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 190717 버튼 class 확인 -->
          <p class="sub-text mg-t10">* 맞교대 신청이 <span class="f-color01">반려</span> 되었습니다.</p>

            <p class="sub-text mg-t5">* 승인 <span class="f-color01">대기중</span> 입니다.</p>
            <p class="sub-text mg-t5">* 신청 내역을 변경하시려면 신청 취소 후 다시 신청해주세요</p> -->

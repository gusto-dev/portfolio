        <!-- //header -->

        <!-- main -->
        <section class="content-sub">
            <div class="content-title">
            </div>
            <div class="content-full content-list-box h100"> <!-- 191101  h100 class 추가 6 -->
                <div class="content-list">
                    <p class="sub-text mg-t12">
                        <span class="txt-bold txt-blue">배타미</span>
                        님 건강진단서 잔여일이 <strong class="f-color01 f-s18">5</strong>일 남았습니다.<br>
                        건강진단서를 제출해주세요.
                    </p>
                    <!-- 200310 notice-box 추가 -->
                    <div class="notice-box type01">
                        <h4 class="notice-tit">주의사항</h4>
                        <p class="text">1. 검진항목(장티푸스, 폐결핵, 전염성피부질환) <span class="under-line">정상 판정 확인</span></p>
                        <p class="text">2. 결과서내 <span class="under-line">‘검진일’</span> 정확히 입력(판정일, 발급일 아님)</p>
                        <p class="text">3. 결과서의 모든 내용이 명확히 보이도록 밝은 곳에서 선명하게 촬영후 업로드</p>
                    </div>
                    <div class="table table-info line-style02 mg-t20">
                        <table>
                            <caption>건강진단서 제출</caption>
                            <tbody>
                                <tr>
                                    <th class="w33" scope="row">발급일</th>
                                    <td colspan="3">
                                        <i class="icon icon-input-calendar mg-r4"></i><span>2019.06.01</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th class="w33" scope="row">유효기간</th>
                                    <td colspan="3">
                                        <i class="icon icon-input-calendar mg-r4"></i><span>2019.06.01</span>
                                        ~
                                        <i class="icon icon-input-calendar mg-r4"></i><span>2019.06.01</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th class="w33" scope="row">첨부파일</th>
                                    <td colspan="3" class="append-area">
                                        <div class="append-img-box">
                                            <img src="../../../resources/images/img_sample.jpg">
                                            <button type="button" class="btn-clear">삭제</button>
                                        </div>
                                        <button type="button" class="btn-camera">카메라작동</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="btn-single">
                    <button type="button" role="button">제출</button>
                </div>

<body>
   <div class="cgv-mobile"> 

    <!-- header -->
    <header>
      <a class="nav-sub">
        <img class="icn-page-prev" src="../../../resources/images/icon_page_prev.png" aria-label="이전으로" />
        <h3 class="title">근무조정 신청</h3>
      </a>
       <!-- 190712 버튼 제거 -->
    </header>
    <!-- //header -->

    <!-- main -->
    <section class="content-sub">
      <div class="content-full content-list-box">
        <div class="content-list">
          <div class="notice-box">
            <h4 class="notice-tit">근무조정 주의사항</h4>
            <p class="text">근무 조정은 최소 근무 1일전 신청 가능</p>
            <p class="text">CS 리더와 사전 협의 후  신청</p>
            <p class="text">기존 근무일이 포함된 주간에서 근무조정 신청 가능</p>
            <p class="text">근무 조정 시 신청자의 휴일 변경에 동의함</p>
                
          </div>
          <div class="table table-info mg-t25">
            <table>
              <caption>근무조정신청내역</caption>
              <thead>
                <tr>
                  <th class="w30 txt-c" scope="col">구분</th>
                  <th class="txt-c" scope="col">신청자</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th scope="row" class="w33">이름</th>
                  <td class="pd-l15">박서준</td>
                </tr>
                <tr>
                  <th scope="row" class="w33">소정근로시간</th>
                  <td class="pd-l15">6.58</td>
                </tr>
                <tr>
                  <th scope="row" class="w33">기존근무일</th>
                  <td class="tbl-input pd-l15">2019-06-27</td>
                </tr>
                <tr>
                  <th scope="row" class="w33">기존근무시간</th>
                  <td class="pd-l15"><i class="icon icon-input-clock mg-r4"></i>08:00~13:00</td>
                </tr>
                <tr>
                  <th scope="row" class="w33">변경근무일</th>
                  <td class="tbl-input pd-l15">
                    <button class="input-button pop-open" href="#calendarPop">
                      <i class="icon icon-input-calendar"></i> 
                      <span class="mg-l2">날짜를 선택하세요</span>
                    </button>
                  </td>
                </tr>
                <tr>
                  <th scope="row" class="w33">변경근무시간</th>
                  <td class="tbl-input pd-l15">
                    <button class="input-button pop-open" href="#calendarPop">
                      <i class="icon icon-input-clock mg-r4"></i>
                      <span class="mg-l2">시간을 선택하세요</span>
                    </button>
                  </td>
                </tr>
                <tr>
                  <th scope="row" class="w33">사유</th>
                  <td class="tbl-input pd-l15">
                    <div class="input-single">
                      <div class="input-wrap">
                        <input type="input" placeholder="사유를 입력하세요">
                      </div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- 7/17 버튼위치 변경, .btn-single 추가 -->
          <div class="btn-single">
           <button class="">신청하기</button>
          </div>
        </div>
      </div>
    </section>
  </div>
  <!-- //cgv-mobile -->


</body>

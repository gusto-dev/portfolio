    <script type="text/javascript" src="../../asset/scripts/lib/fullcalendar.daygrid-4.2.0.main.min.js"></script>

<body>
    <div class="cgv-mobile">

        <!-- header -->
        <header>
            <a class="nav-sub">
                <img class="icn-page-prev" src="../../../resources/images/icon_page_prev.png" aria-label="이전으로" />
                <h3 class="title">스케줄 신청</h3>
            </a>
        </header>
        <!-- //header -->

        <!-- main -->
        <section class="content-sub">
            <div class="content-full content-list-box mg-t12">
                <div class="content-list">
                </div>
            </div>
        </section>
    </div>
    <!-- //cgv-mobile -->

    <!-- 팝업(시간선택) -->
    <div class="pop-dimed show-pop">
        <div class="pop-bg"></div>
        <div data-pop="#timesel" class="pop-house">
            <div class="pop-layer">
                <div class="pop-container">
                    <h3>증빙서류 제출<i class="icon icon-close pop-close"></i></h3>
                    <div class="con min-height-auto">
                        <div class="table table-info line-style02 mg-t12">
                            <table>
                                <caption>증빙서류 제출</caption>
                                <tbody>
                                    <tr>
                                        <th class="w33">이름</th>
                                        <td colspan="3">설지환</td>
                                    </tr>
                                    <tr>
                                        <th class="w33">제출일시</th>
                                        <td colspan="3">
                                            <i class="icon icon-input-calendar mg-r4"></i><span>2019-06-01 15:23</span>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th class="w33">서류명</th>
                                        <td colspan="3" class="tbl-input">
                                            <div class="input-single">
                                              <div class="input-wrap">
                                                <input type="input" placeholder="서류명을 입력하세요">
                                              </div>
                                            </div>
                                          </td>
                                    </tr>
                                    <tr>
                                        <th class="w33">첨부파일</th>
                                        <td colspan="3" class="append-area">
                                            <div class="append-img-box">
                                                <img src="../../../resources/images/img_sample.jpg">
                                                <button type="button" class="btn-clear">삭제</button>
                                            </div>
                                            <button type="button" class="btn-camera">카메라작동</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="btn-single">
                    <a class="" type="button" role="button">저장</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

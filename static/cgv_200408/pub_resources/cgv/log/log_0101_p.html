  <script type="text/javascript" src="../../asset/scripts/lib/fullcalendar.core-4.2.0.main.min.js"></script>
  <script type="text/javascript" src="../../asset/scripts/lib/fullcalendar.daygrid-4.2.0.main.min.js"></script>
  <script type="text/javascript" src="../../asset/scripts/lib/fullcalendar.interaction-4.2.0.main.min.js"></script>

<body>
  <div class="cgv-mobile">

    <!-- header -->
    <header>
      <a class="nav-sub">
        <img class="icn-page-prev" src="../../../resources/images/icon_page_prev.png" aria-label="이전으로" />
        <h3 class="title">로그인</h3>
      </a>
    </header>
    <!-- //header -->

    <!-- main -->
    <section class="content-sub">
      <div class="content-full content-list-box">
        <div class="inner-container txt-c">
          <img class="logo-login" src="../../../resources/images/intro_title_system.png" alt="모바일 오피스 시스템"/>
          <form class="form-login">
            <ul>
              <li class="input-vertical">
                <h5>아이디</h5>
                <div class="input-wrap">
                  <input type="" name="" aria-describedby="" placeholder="아이디 입력">
                </div>
              </li>
              <li class="input-vertical group">
                <h5>비밀번호</h5>
                <div class="input-wrap">
                  <input type="" name="" aria-describedby="" placeholder="비밀번호 (8~15자리 숫자, 영문, 특수문자)">
                </div>
              </li>
            </ul>
            <div class="checkbox-nemo">
              <input type="checkbox" id="checkid1" name="checkid1" value="체크">
              <label for="checkid1">
                <span class="customInput"></span>
                <span>자동 로그인 설정</span>
              </label>
              <div class="oauth-way">
                  <!-- 기종에따라 둘 중 하나만 나옴 -->
                  
                  <button href="#popCertyConfirm" class="pop-open" type="button">
                    <img src="../../../resources/images/login_touchID.png"><span>Touch ID</span>
                  </button>
                  <!-- <button href="#popTouchId" class="pop-open" type="button">
                    <img src="../../../resources/images/login_faceID.png"><span>Face ID</span>
                  </button> -->
             
              </div>
            </div>

          </form>
        </div>
        <!-- 7/17 .btn-single 추가 -->
        <div class="btn-single btn-red">
          <a class="" href="" target="_self">로그인</a>
        </div>
      </div>
    </section>

  </div>
  <!-- //cgv-mobile -->

  <!-- 팝업() -->
  <!-- .show-pop 추가시 팝업 노출 -->
  <div class="pop-dimed">
    <div class="pop-bg"></div>
    <div data-pop="#popCertyConfirm" class="pop-house">
      <div class="pop-layer pop-alert bd-radius10">
        <div class="pop-container txt-c">
          <h5 class="pop-title">본인인증</h5>
          <p class="pop-result">본인인증이 완료되었습니다.</p>
          <a href="#" class="pop-close btn-close">Close</a>
        </div>
      </div>
    </div>
  </div>
  <!-- //팝업 -->

  <!-- 팝업(휴대폰 문자인증 팝업) -->
  <!-- .show-pop 추가시 팝업 노출 -->
  <div class="pop-dimed show-pop">
    <div class="pop-bg"></div>
    <div data-pop="#dimedPop" class="pop-house">
      <div class="pop-layer">
        <!-- 7/14 수정 h3 위치 변경 -->
        <h3>휴대폰 인증<i class="icon icon-close pop-close"></i></h3>
        <div class="pop-container small">
          <!-- 7/14 수정 .con 태그 추가 -->
          <div class="con">
            <p class="pop-msg">문자로 전송된 인증번호를 입력하세요</p>
            <div class="authentic-num mg-b16">
              <div class="input-area">
                <input class="input-search" placeholder="인증번호 숫자 6자리" maxlength="6" />
                <span class="input-time">03:00</span>
              </div>
              <button class="btn-radius" type="button" role="button">재요청</button>
            </div>
          </div>
        </div>
        <div class="btn-single"> <!-- 190718 버튼 위치 확인 -->
          <a class="pop-close btn-single">등록</a>
        </div>
      </div>
    </div>
  </div>
  <!-- //팝업 -->

  <!-- 팝업(지문정보 변경 팝업) -->
  <!-- .show-pop 추가시 팝업 노출 -->
  <div class="pop-dimed">
    <div class="pop-bg"></div>
    <div data-pop="#dimedPop" class="pop-house">
      <div class="pop-layer">
        <div class="pop-container small">
          <!-- 7/14 수정 .con 태그 추가 -->
          <div class="con">
          <!--  7/14 .mg-t16 -> .mg-t40 수정 -->
          <p class="pop-msg mg-t40 mg-b12">고객님의 휴대폰에 등록한 지문정보가<br/>
              변경(추가 또는 삭제) 되었습니다.<br />
              지문을 다시 등록해주셔야 이용이 가능합니다.</p>
          </div>
          <div class="btn-group btn-list2">
            <a class="">등록</a>
            <a class="pop-close">취소</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- //팝업 -->
  <!-- .show-pop 추가시 팝업 노출 -->
  <div class="pop-dimed">
      <div class="pop-bg"></div>
      <div data-pop="#dimedPop" class="pop-house">
        <div class="pop-layer">
          <div class="pop-container small">
            <!-- 7/14 수정 .con 태그 추가 -->
            <div class="con">
              <!--  7/14 .mg-t16 -> .mg-t40 수정 -->
              <p class="pop-msg mg-t40 mg-b12">고객님의 휴대폰에 등록한 얼굴정보가<br/>
                변경(추가 또는 삭제) 되었습니다.<br />
                지문을 다시 등록해주셔야 이용이 가능합니다.</p>
            </div>
            <div class="btn-group btn-list2">
              <a class="">등록</a>
              <a class="pop-close">취소</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- //팝업 -->
  


</body>

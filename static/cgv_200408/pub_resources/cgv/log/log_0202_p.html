<body>
  <div class="cgv-mobile">

    <!-- header -->
    <header>
      <a class="nav-sub">
        <img class="icn-page-prev" src="../../../resources/images/icon_page_prev.png" aria-label="이전으로" />
        <h3 class="title">간편 로그인 등록</h3>
      </a>
    </header>
    <!-- //header -->

    <!-- main -->
    <section class="content-sub">
      <div class="content-full content-list-box">
        <div class="content-list subinner-container">
          <p class="center-info">
            휴대폰에 등록된 얼굴(face)인식 정보를 이용하여 
            비밀번호를 입력하지 않고 편리하게 로그인이 
            가능합니다.
          </p>
          <img class="certifyid-img" src="../../../resources/images/faceID.png" aria-label="faceID"/>
        </div>
        <!-- 7/17 .btn-list2 .btn-red 추가 -->
        <div class="btn-group btn-list2 btn-red">
          <a class="pop-open" href="" target="_self">등록</a>
          <a class="pop-open" href="" target="_self">취소</a>
        </div>
      </div>
    </section>
  </div>
  <!-- //cgv-mobile -->


  <!-- 팝업(페이스아이디 설정완료) -->
  <!-- .show-pop 추가시 팝업 노출 -->
  <div class="pop-dimed show-pop">
    <div class="pop-bg"></div>
    <div data-pop="#popFaceId" class="pop-house">
      <div class="pop-layer pop-alert">
        <div class="pop-container txt-c">
          <img class="pop-certifyid" src="../../../resources/images/faceID_pop.png" />
          <p class="pop-result mg-t24">Face ID 설정이 완료되었습니다.</p>
          <a href="#" class="pop-close btn-close">Cancel</a>
        </div>
      </div>
    </div>
  </div>

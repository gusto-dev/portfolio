<script>
	
	document.addEventListener('DOMContentLoaded', function() {
	var toDay  =  new Date("2019","07",25);
	
	var calendarEl = document.getElementById('calendar');
	var calendar = new FullCalendar.Calendar(calendarEl, {
		plugins: [ 'dayGrid','interaction' ],
		titleFormat: function(date) {
		    return toDay.getFullYear() +"년 "+ toDay.getMonth() +"월";
		},
		defaultDate: toDay,
		firstDay:1,
// 		locale: 'ko', // the initial locale
		editable: true,
		header :{
			  center: 'title',
			  left:   'prev',
			  right:  'next'
			},
// 		selectable: true,
		eventLimit: true, // allow "more" link when too many events
		defaultView:'dynamicCalendar',
		columnHeaderText: function(date) {
			if (date.getDay() === 1) return '월';
			if (date.getDay() === 2) return '화';
			if (date.getDay() === 3) return '수';
			if (date.getDay() === 4) return '목';
			if (date.getDay() === 5) return '금';
			if (date.getDay() === 6) return '토';
			if (date.getDay() === 0) return '일';
			
		},
		views: {
			dynamicCalendar: {
			type: 'dayGrid',
			duration: { weeks: 6 },
			}
		},
		dateClick: function(info) {
			fn_test(info.dateStr);
		},
		eventClick: function(info) {
			info.el.style.borderColor = 'red';
		},
		events: [
					{
						title : "All Day Event"
						,start : "2019-07-01"
					},
					{
						title : "All Day Event"
						,start : "2019-07-05"
					},
					{
						title : "All Day Event"
						,start : "2019-07-25"
					},
				]
	});
	calendar.render();
	
	function fn_test(date){
		calendar.addEvent({
	              title: 'dynamic event',
	              start: date,
	              allDay: true
	            });
	}
});


</script>
</head>
<body>
	<div id='calendar'></div>
</body>

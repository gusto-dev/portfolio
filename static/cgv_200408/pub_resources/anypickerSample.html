<!DOCTYPE html>

<html>

	<head>

		<title>Parse Input and Format Ouput - AnyPicker</title>
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
		<meta name="msapplication-tap-highlight" content="no" />

		<style type="text/css">

			body
			{
				margin: 0px;
			}

			.input-cont
            {
                width: 300px;
                padding: 20px;
            }

            input
            {
            	width: 200px;
            	height: 30px;
            	padding: 3px 10px;

            	margin-bottom: 16px;
            }

		</style>

		<link rel="stylesheet" type="text/css" href="../src/anypicker-font.css" />
		<link rel="stylesheet" type="text/css" href="../src/anypicker.css" />

		<link rel="stylesheet" type="text/css" href="../src/anypicker-ios.css" />
		<link rel="stylesheet" type="text/css" href="../src/anypicker-android.css" />
		<link rel="stylesheet" type="text/css" href="../src/anypicker-windows.css" />

		<script type="text/javascript" src="vendors/jquery-1.11.1.min.js"></script>
		<script type="text/javascript" src="../src/anypicker.js"></script>

		<script type="text/javascript">

			var oArrData = [];

			function createDataSource(){
				var oArrDataNum = [30, 59],iTempIndex1, iTempIndex2;
        var txtIdx;
				for(iTempIndex1 = 0; iTempIndex1 < oArrDataNum.length; iTempIndex1++){
          if(iTempIndex1 == 0){
            var iNum = oArrDataNum[iTempIndex1],
            oArrDataComp = [];
            for(iTempIndex2 = 1; iTempIndex2 < (iNum + 1); iTempIndex2++){
              if(iTempIndex2 < 10) txtIdx = "0"+iTempIndex2;
              else txtIdx = iTempIndex2 + "";
              oArrDataComp.push({
                val: txtIdx,
                label: txtIdx
              });
            }
          }else{
            var iNum = oArrDataNum[iTempIndex1],
            oArrDataComp = [];
            for(iTempIndex2 = 0; iTempIndex2 < (iNum + 1); iTempIndex2 = iTempIndex2+5){
              if(iTempIndex2 < 10) txtIdx = "0"+iTempIndex2;
              else txtIdx = iTempIndex2 + "";
              oArrDataComp.push({
                val: txtIdx,
                label: txtIdx
              });
            }
          }
					oArrData.push(oArrDataComp);
				}
        console.log("oArrData",oArrData)
			}

			createDataSource();

			var oArrComponents = [
						{
							component: 0,
							name: "hours",
							label: "Hours",
							width: "50%",
							textAlign: "center"
						},
						{
							component: 1,
							name: "minutes",
							label: "Minutes",
							width: "50%",
							textAlign: "center"
						}
					],
			oArrDataSource = [
						{
							component: 0,
							data: oArrData[0]
						},
						{
							component: 1,
							data: oArrData[1]
						}
					];

			$(document).ready(function(){

        $("#ip-de").AnyPicker({
					mode: "select",
					showComponentLabel: true,
					components: oArrComponents,
					dataSource: oArrDataSource,
					parseInput: function(item){
             console.log("oArrComponents",oArrComponents)
             console.log("oArrDataSource",oArrDataSource)
             console.log("in",item);
             var oArrInput = [];
             var oValues = {hours:1 , minutes:0};
             var arr = item.split(":");
             oValues.hours = arr[0]
             oValues.minutes = arr[1]
             oArrInput = [oValues.hours ,oValues.minutes ];
             return oArrInput;
          },
					formatOutput: function(item){
            console.log("out",item)
            return item.values[0].label+":"+ item.values[1].label;
          }
				});

			});

		</script>

	</head>

	<body>

		<table class="input-cont">

        	<tr>

        		<td>Duration : (Default)</td>

        	</tr>

        	<tr>

            	<td>
            		<input type="text" id="ip-de" value="01:10" readonly />
            	</td>

        	</tr>

        </table>

	</body>

</html>
